<nav class="navbar">
  <div class="nav-container">
    <a routerLink="/" class="brand" (click)="closeMenu()">
      <span class="brand-text">Natura<strong>Vida</strong></span>
    </a>

    <button class="menu-toggle" (click)="toggleMenu()" [class.active]="menuOpen" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>

    <div class="nav-links" [class.open]="menuOpen">
  <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="closeMenu()">Inicio</a>
  <a routerLink="/catalogo" routerLinkActive="active" (click)="closeMenu()">Productos</a>
  <a routerLink="/ofertas" routerLinkActive="active" (click)="closeMenu()">Ofertas </a>  
  <a routerLink="/nosotros" routerLinkActive="active" (click)="closeMenu()">Nosotros</a>
  <a routerLink="/contacto" routerLinkActive="active" (click)="closeMenu()">Contacto</a>
</div>

    <div class="nav-actions">
      <a routerLink="/carrito" class="cart-btn" title="Carrito">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"></path>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <path d="M16 10a4 4 0 01-8 0"></path>
        </svg>
        @if (carritoService.totalItems() > 0) {
          <span class="cart-badge">{{ carritoService.totalItems() }}</span>
        }
      </a>

      @if (authService.isLoggedIn()) {
        <div class="user-menu">
          <button class="user-btn" title="{{ authService.currentUser()?.nombre }}">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span class="user-name">{{ authService.currentUser()?.nombre }}</span>
          </button>
          @if (authService.isAdmin()) {
            <a routerLink="/admin" class="dropdown-item" (click)="closeMenu()">Panel Admin</a>
          }
          <button class="dropdown-item logout" (click)="logout()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            Cerrar sesión
          </button>
        </div>
      } @else {
        <a routerLink="/login" class="btn-login" (click)="closeMenu()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"></path>
            <polyline points="10 17 15 12 10 7"></polyline>
            <line x1="15" y1="12" x2="3" y2="12"></line>
          </svg>
          Ingresar
        </a>
      }
    </div>
  </div>
</nav>
